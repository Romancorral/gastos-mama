<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mis Gastos">
<title>Mis Gastos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;color:#111;font-size:14px;background:#f5f5f5}
.app{padding:1rem;max-width:600px;margin:0 auto}
.tabs{display:flex;border-bottom:0.5px solid #ddd;margin-bottom:1.25rem}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:#111;border-bottom:2px solid #111;font-weight:500}
.view{display:none}.view.active{display:block}
.month-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.month-bar select{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;width:auto}
.btn{padding:7px 14px;background:#fff;border:0.5px solid #ccc;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:#111;font-family:inherit}
.btn:hover{background:#f0f0f0}
.btn.full{width:100%;padding:9px}
.btn.primary{background:#111;color:#fff;border-color:#111}
.btn.primary:hover{opacity:.85}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:8px}
.form-grid input,.form-grid select{font-family:inherit;font-size:13px;padding:7px 9px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;width:100%}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row2 input,.form-row2 select{font-family:inherit;font-size:13px;padding:7px 9px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;width:100%}
.hidden{display:none!important}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1rem 0}
.metric{background:#fff;border-radius:8px;padding:.75rem 1rem;border:0.5px solid #eee}
.metric .lbl{font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.metric .val{font-size:18px;font-weight:500}
.val.r{color:#C0392B}.val.g{color:#1D9E75}
.divider{height:0.5px;background:#eee;margin:1rem 0}
.sec-lbl{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.cat-row{margin-bottom:7px}
.cat-top{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:3px}
.bar-bg{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:#888;font-weight:500;padding:5px 6px;border-bottom:0.5px solid #eee}
td{padding:6px 6px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500}
.action-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px;color:#aaa}
.action-btn:hover{color:#111}
.empty{color:#aaa;font-size:12px;padding:.75rem 0;text-align:center}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.25rem;width:340px;max-width:92vw}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1rem}
.modal label{display:block;font-size:12px;color:#888;margin-bottom:3px;margin-top:10px}
.modal input,.modal select{width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.modal-btns .btn{flex:1;text-align:center}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.cmp-col{border:0.5px solid #eee;border-radius:8px;padding:1rem;background:#fff}
.cmp-col-title{font-size:12px;font-weight:500;margin-bottom:.75rem;color:#888;text-transform:uppercase;letter-spacing:.04em}
.cmp-metric{margin-bottom:6px}
.cmp-metric .lbl{font-size:11px;color:#aaa}
.cmp-metric .val{font-size:16px;font-weight:500}
.diff-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid #f0f0f0;font-size:12px}
.diff-row:last-child{border-bottom:none}
.diff-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.up{background:#FCEBEB;color:#A32D2D}.down{background:#EAF3DE;color:#3B6D11}.same{background:#f5f5f5;color:#888}
.chart-wrap{position:relative;height:180px;margin:1rem 0}
.report-box{background:#fff;border:0.5px solid #eee;border-radius:8px;padding:1.5rem}
.rm{border:0.5px solid #eee;border-radius:6px;padding:.75rem 1rem}
.rm .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sync-bar{background:#FFF9E6;border:0.5px solid #F0C040;border-radius:8px;padding:10px 14px;font-size:13px;color:#7A5500;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.sync-btn{background:#F0C040;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#7A5500}
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr 1fr}
  .form-grid input[type=text]{grid-column:1/-1}
  .metrics .val{font-size:15px}
  table{font-size:11px}
}
</style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="showTab('registro')">Registro</button>
    <button class="tab" onclick="showTab('comparar')">Comparar</button>
    <button class="tab" onclick="showTab('reporte')">Reporte</button>
  </div>
 
  <div class="view active" id="view-registro">
    <div class="month-bar">
      <span style="font-size:12px;color:#888">Mes:</span>
      <select id="sel-mes" onchange="render()"></select>
    </div>
    <div class="sec-lbl">nuevo movimiento</div>
    <div class="form-grid">
      <input type="text" id="desc" placeholder="Descripción">
      <input type="number" id="monto" placeholder="Monto $" min="0" step="100">
      <select id="tipo" onchange="toggleCat()">
        <option value="gasto">Gasto</option>
        <option value="ingreso">Ingreso</option>
      </select>
    </div>
    <div class="form-row2">
      <input type="date" id="fecha">
      <select id="cat">
        <option value="Alimentación">🛒 Alimentación</option>
        <option value="Transporte">🚌 Transporte</option>
        <option value="Salud">💊 Salud</option>
        <option value="Servicios">💡 Servicios</option>
        <option value="Ropa">👗 Ropa</option>
        <option value="Entretenimiento">🎬 Entretenimiento</option>
        <option value="Casa">🏠 Casa</option>
        <option value="Otro">📦 Otro</option>
      </select>
    </div>
    <button class="btn full" id="btn-add" onclick="agregar()">+ Agregar movimiento</button>
    <div class="metrics">
      <div class="metric"><div class="lbl">Ingresos</div><div class="val g" id="tot-ing">$0</div></div>
      <div class="metric"><div class="lbl">Gastos</div><div class="val r" id="tot-gas">$0</div></div>
      <div class="metric"><div class="lbl">Balance</div><div class="val" id="tot-bal">$0</div></div>
    </div>
    <div class="divider"></div>
    <div class="sec-lbl">gastos por categoría</div>
    <div id="cat-bars"><p class="empty">Sin gastos este mes.</p></div>
    <div class="divider"></div>
    <div class="sec-lbl">movimientos</div>
    <table><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th style="text-align:right">Monto</th><th></th></tr></thead>
    <tbody id="tabla"></tbody></table>
    <p class="empty" id="empty-msg">Agrega tu primer movimiento ↑</p>
  </div>
 
  <div class="view" id="view-comparar">
    <div class="month-bar" style="flex-wrap:wrap">
      <select id="cmp-a" onchange="renderComparar()" style="width:auto"></select>
      <span style="font-size:13px;color:#888">vs</span>
      <select id="cmp-b" onchange="renderComparar()" style="width:auto"></select>
    </div>
    <div id="cmp-content"><p class="empty">Selecciona dos meses para comparar.</p></div>
  </div>
 
  <div class="view" id="view-reporte">
    <div class="month-bar">
      <span style="font-size:12px;color:#888">Mes:</span>
      <select id="sel-mes-rep" onchange="renderReporte()" style="width:auto"></select>
    </div>
    <div id="report-content"></div>
  </div>
</div>
 
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">Editar movimiento</div>
    <label>Descripción</label><input type="text" id="edit-desc">
    <label>Monto</label><input type="number" id="edit-monto" min="0" step="100">
    <label>Fecha</label><input type="date" id="edit-fecha">
    <label>Tipo</label>
    <select id="edit-tipo" onchange="toggleEditCat()">
      <option value="gasto">Gasto</option>
      <option value="ingreso">Ingreso</option>
    </select>
    <div id="edit-cat-wrap">
      <label>Categoría</label>
      <select id="edit-cat">
        <option value="Alimentación">🛒 Alimentación</option>
        <option value="Transporte">🚌 Transporte</option>
        <option value="Salud">💊 Salud</option>
        <option value="Servicios">💡 Servicios</option>
        <option value="Ropa">👗 Ropa</option>
        <option value="Entretenimiento">🎬 Entretenimiento</option>
        <option value="Casa">🏠 Casa</option>
        <option value="Otro">📦 Otro</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn primary" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const API = 'https://script.google.com/macros/s/AKfycbz-WSTIphkpyoYdNhPxjZ81c5cbHK-kfDSGrExKBFke_dEwL2ZuoNXoPtADwzrE7GM1Og/exec';
const CAT_COLORS={'Alimentación':'#1D9E75','Transporte':'#378ADD','Salud':'#D4537E','Servicios':'#EF9F27','Ropa':'#7F77DD','Entretenimiento':'#D85A30','Casa':'#639922','Otro':'#888780'};
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
 
let movs=[], editId=null, charts={}, pendientes=[];
 
function fmt(n){return '$'+Math.round(Math.abs(n)).toLocaleString('es-CL')}
function mesKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function mesLabel(k){const[y,m]=k.split('-');return MESES[parseInt(m)-1]+' '+y}
function hoy(){return new Date().toISOString().split('T')[0]}
function fmtFecha(f){if(!f)return '';const[,m,d]=f.split('-');return d+'/'+m}
function getMes(){return document.getElementById('sel-mes').value||mesKey()}
 
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
 
function saveLocal(){localStorage.setItem('gastos_v4',JSON.stringify({movs,pendientes}))}
function loadLocal(){
  try{const d=JSON.parse(localStorage.getItem('gastos_v4')||'{}');movs=d.movs||[];pendientes=d.pendientes||[];}
  catch(e){movs=[];pendientes=[];}
}
 
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='gcb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const url=API+'?'+new URLSearchParams({...params,callback:cb});
    const s=document.createElement('script');
    const timer=setTimeout(()=>{delete window[cb];s.remove();rej(new Error('timeout'));},12000);
    window[cb]=data=>{clearTimeout(timer);delete window[cb];s.remove();res(data);};
    s.onerror=()=>{clearTimeout(timer);delete window[cb];s.remove();rej(new Error('error'));};
    s.src=url;document.head.appendChild(s);
  });
}
 
async function sincronizarPendientes(){
  if(!pendientes.length)return;
  const restantes=[];
  for(const p of [...pendientes]){
    try{
      if(p.action==='add'){
        const res=await jsonp({action:'add',mes:p.mes,desc:p.desc,monto:p.monto,tipo:p.tipo,cat:p.cat,fecha:p.fecha});
        if(res.ok){const idx=movs.findIndex(m=>m.id===p.localId);if(idx>=0)movs[idx].id=res.id;}
        else restantes.push(p);
      } else if(p.action==='edit'){
        await jsonp({action:'edit',id:p.id,desc:p.desc,monto:p.monto,tipo:p.tipo,cat:p.cat,fecha:p.fecha});
      } else if(p.action==='delete'){
        await jsonp({action:'delete',id:p.id});
      }
    }catch(e){restantes.push(p);}
  }
  pendientes=restantes;
  saveLocal();
  if(!pendientes.length){toast('✅ Sincronizado con Google Sheets');renderSyncBar();}
}
 
async function cargarDesdeSheets(){
  try{
    const res=await jsonp({action:'getAll',mes:''});
    if(res.ok&&res.data){
      movs=res.data.map(m=>({...m,monto:parseFloat(m.monto)||0}));
      pendientes=[];
      saveLocal();
      poblarSelectores();
      render();
      toast('✅ Datos cargados desde Google Sheets');
    }
  }catch(e){
    toast('📱 Sin conexión — usando datos locales');
  }
}
 
function toggleCat(){
  const isIng=document.getElementById('tipo').value==='ingreso';
  document.getElementById('cat').style.visibility=isIng?'hidden':'visible';
}
function toggleEditCat(){
  const isIng=document.getElementById('edit-tipo').value==='ingreso';
  document.getElementById('edit-cat-wrap').classList.toggle('hidden',isIng);
}
 
function poblarSelectores(){
  const keys=[...new Set(movs.map(m=>m.mes))].sort().reverse();
  if(!keys.includes(mesKey()))keys.unshift(mesKey());
  ['sel-mes','sel-mes-rep','cmp-a','cmp-b'].forEach(id=>{
    const sel=document.getElementById(id);
    const prev=sel.value;
    sel.innerHTML=keys.map(k=>`<option value="${k}">${mesLabel(k)}</option>`).join('');
    if(prev&&keys.includes(prev))sel.value=prev;
  });
  if(keys.length>=2)document.getElementById('cmp-b').value=keys[1];
}
 
function calcular(lista){
  let ing=0,gas=0;const catGas={};
  lista.forEach(m=>{
    const v=parseFloat(m.monto)||0;
    if(m.tipo==='ingreso')ing+=v;
    else{gas+=v;catGas[m.cat]=(catGas[m.cat]||0)+v;}
  });
  return{ing,gas,bal:ing-gas,catGas};
}
 
function renderSyncBar(){
  const existing=document.getElementById('sync-bar');
  if(existing)existing.remove();
  if(!pendientes.length)return;
  const bar=document.createElement('div');
  bar.id='sync-bar';bar.className='sync-bar';
  bar.innerHTML=`<span>📡 ${pendientes.length} cambio(s) sin sincronizar</span><button class="sync-btn" onclick="sincronizarPendientes()">Sincronizar</button>`;
  document.getElementById('view-registro').prepend(bar);
}
 
function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['registro','comparar','reporte'][i]===t));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  if(t==='comparar')renderComparar();
  if(t==='reporte')renderReporte();
}
 
function agregar(){
  const desc=document.getElementById('desc').value.trim();
  const monto=parseFloat(document.getElementById('monto').value);
  const tipo=document.getElementById('tipo').value;
  const cat=tipo==='ingreso'?'—':document.getElementById('cat').value;
  const fecha=document.getElementById('fecha').value||hoy();
  const mes=getMes();
  if(!desc||isNaN(monto)||monto<=0){document.getElementById('desc').focus();return;}
  const localId='local_'+Date.now();
  movs.unshift({id:localId,mes,desc,monto,tipo,cat,fecha});
  pendientes.push({action:'add',localId,mes,desc,monto,tipo,cat,fecha});
  saveLocal();poblarSelectores();render();
  document.getElementById('desc').value='';document.getElementById('monto').value='';document.getElementById('fecha').value=hoy();
  toast('💾 Guardado');
  sincronizarPendientes();
}
 
function render(){
  const mes=getMes();
  const lista=movs.filter(m=>m.mes===mes);
  const{ing,gas,bal,catGas}=calcular(lista);
  document.getElementById('tot-ing').textContent=fmt(ing);
  document.getElementById('tot-gas').textContent=fmt(gas);
  const be=document.getElementById('tot-bal');
  be.textContent=(bal<0?'-':'')+fmt(bal);be.className='val '+(bal>=0?'g':'r');
  const cats=Object.entries(catGas).sort((a,b)=>b[1]-a[1]);
  const bars=document.getElementById('cat-bars');
  if(!cats.length){bars.innerHTML='<p class="empty">Sin gastos este mes.</p>';}
  else{const mx=cats[0][1];bars.innerHTML=cats.map(([c,v])=>`<div class="cat-row"><div class="cat-top"><span>${c}</span><span>${fmt(v)} · ${Math.round(v/gas*100)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/mx*100)}%;background:${CAT_COLORS[c]||'#888'}"></div></div></div>`).join('');}
  const tbody=document.getElementById('tabla');
  const em=document.getElementById('empty-msg');
  if(!lista.length){tbody.innerHTML='';em.style.display='block';}
  else{
    em.style.display='none';
    tbody.innerHTML=lista.map(m=>{
      const col=CAT_COLORS[m.cat]||'#888';const isI=m.tipo==='ingreso';
      const catBadge=isI?'<span style="color:#ccc">—</span>':`<span class="badge" style="background:${col}22;color:${col}">${m.cat}</span>`;
      return`<tr><td style="color:#aaa">${fmtFecha(m.fecha)}</td><td>${m.desc}</td><td>${catBadge}</td><td><span class="badge" style="background:${isI?'#1D9E7522':'#C039222'};color:${isI?'#1D9E75':'#C0392B'}">${isI?'Ingreso':'Gasto'}</span></td><td style="text-align:right;font-weight:500;color:${isI?'#1D9E75':'#C0392B'}">${isI?'+':'-'}${fmt(m.monto)}</td><td><button class="action-btn" onclick="abrirEditar('${m.id}')">✏️</button><button class="action-btn" onclick="eliminar('${m.id}')">🗑</button></td></tr>`;
    }).join('');
  }
  renderSyncBar();
}
 
function abrirEditar(id){
  const m=movs.find(x=>x.id==id);if(!m)return;
  editId=id;
  document.getElementById('edit-desc').value=m.desc;
  document.getElementById('edit-monto').value=m.monto;
  document.getElementById('edit-fecha').value=m.fecha||hoy();
  document.getElementById('edit-tipo').value=m.tipo;
  document.getElementById('edit-cat').value=m.cat!=='—'?m.cat:'Otro';
  toggleEditCat();
  document.getElementById('modal-bg').classList.add('open');
}
function cerrarModal(){document.getElementById('modal-bg').classList.remove('open');editId=null;}
function guardarEdicion(){
  if(!editId)return;
  const idx=movs.findIndex(x=>x.id==editId);if(idx<0)return;
  const tipo=document.getElementById('edit-tipo').value;
  const desc=document.getElementById('edit-desc').value.trim();
  const monto=parseFloat(document.getElementById('edit-monto').value);
  const fecha=document.getElementById('edit-fecha').value;
  const cat=tipo==='ingreso'?'—':document.getElementById('edit-cat').value;
  movs[idx]={...movs[idx],desc,monto,tipo,cat,fecha};
  pendientes.push({action:'edit',id:editId,desc,monto,tipo,cat,fecha});
  saveLocal();cerrarModal();render();
  toast('✅ Actualizado');sincronizarPendientes();
}
function eliminar(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  movs=movs.filter(m=>m.id!=id);
  pendientes.push({action:'delete',id});
  saveLocal();render();toast('🗑 Eliminado');sincronizarPendientes();
}
 
function renderComparar(){
  const ka=document.getElementById('cmp-a').value;
  const kb=document.getElementById('cmp-b').value;
  if(ka===kb){document.getElementById('cmp-content').innerHTML='<p class="empty">Selecciona dos meses distintos.</p>';return;}
  const ra=calcular(movs.filter(m=>m.mes===ka));
  const rb=calcular(movs.filter(m=>m.mes===kb));
  const todasCats=[...new Set([...Object.keys(ra.catGas),...Object.keys(rb.catGas)])].filter(c=>c!=='—').sort();
  function diff(a,b){if(b===0&&a===0)return{txt:'—',cls:'same'};if(b===0)return{txt:'+100%',cls:'up'};const p=Math.round((a-b)/b*100);if(p===0)return{txt:'igual',cls:'same'};return p>0?{txt:'+'+p+'%',cls:'up'}:{txt:p+'%',cls:'down'};}
  document.getElementById('cmp-content').innerHTML=`
    <div class="cmp-grid">
      <div class="cmp-col"><div class="cmp-col-title">${mesLabel(ka)}</div>
        <div class="cmp-metric"><div class="lbl">Ingresos</div><div class="val g">${fmt(ra.ing)}</div></div>
        <div class="cmp-metric"><div class="lbl">Gastos</div><div class="val r">${fmt(ra.gas)}</div></div>
        <div class="cmp-metric"><div class="lbl">Balance</div><div class="val ${ra.bal>=0?'g':'r'}">${(ra.bal<0?'-':'')+fmt(ra.bal)}</div></div>
      </div>
      <div class="cmp-col"><div class="cmp-col-title">${mesLabel(kb)}</div>
        <div class="cmp-metric"><div class="lbl">Ingresos</div><div class="val g">${fmt(rb.ing)}</div></div>
        <div class="cmp-metric"><div class="lbl">Gastos</div><div class="val r">${fmt(rb.gas)}</div></div>
        <div class="cmp-metric"><div class="lbl">Balance</div><div class="val ${rb.bal>=0?'g':'r'}">${(rb.bal<0?'-':'')+fmt(rb.bal)}</div></div>
      </div>
    </div>
    <div class="sec-lbl">variación por categoría</div>
    <div style="background:#fff;border-radius:8px;padding:1rem;border:0.5px solid #eee;margin-bottom:1rem">
      ${todasCats.map(c=>{const va=ra.catGas[c]||0,vb=rb.catGas[c]||0,d=diff(va,vb);const col=CAT_COLORS[c]||'#888';return`<div class="diff-row"><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>${c}</span><span style="display:flex;align-items:center;gap:8px"><span style="color:#aaa;font-size:11px">${fmt(vb)} → ${fmt(va)}</span><span class="diff-badge ${d.cls}">${d.txt}</span></span></div>`;}).join('')}
    </div>
    <div class="sec-lbl">gráfico comparativo</div>
    <div class="chart-wrap"><canvas id="cmp-chart" role="img" aria-label="Comparación de gastos por categoría entre dos meses"></canvas></div>`;
  setTimeout(()=>{
    const canvas=document.getElementById('cmp-chart');if(!canvas)return;
    if(charts.cmp)charts.cmp.destroy();
    charts.cmp=new Chart(canvas,{type:'bar',data:{labels:todasCats,datasets:[{label:mesLabel(ka),data:todasCats.map(c=>Math.round(ra.catGas[c]||0)),backgroundColor:'#378ADD99',borderColor:'#378ADD',borderWidth:1},{label:mesLabel(kb),data:todasCats.map(c=>Math.round(rb.catGas[c]||0)),backgroundColor:'#1D9E7599',borderColor:'#1D9E75',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString('es-CL')}}}}});
  },100);
}
 
function renderReporte(){
  const k=document.getElementById('sel-mes-rep').value;
  const lista=movs.filter(m=>m.mes===k);
  const cont=document.getElementById('report-content');
  if(!lista.length){cont.innerHTML='<p class="empty">No hay movimientos en este mes.</p>';return;}
  const{ing,gas,bal,catGas}=calcular(lista);
  const cats=Object.entries(catGas).sort((a,b)=>b[1]-a[1]);
  cont.innerHTML=`
  <div class="report-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #eee">
      <div><div style="font-size:20px;font-weight:500">Resumen financiero</div><div style="font-size:12px;color:#888;margin-top:3px">${mesLabel(k)}</div></div>
      <button class="btn primary" onclick="window.print()">Guardar PDF</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem">
      <div class="rm"><div class="lbl">Ingresos</div><div class="val g" style="font-size:20px">${fmt(ing)}</div></div>
      <div class="rm"><div class="lbl">Gastos</div><div class="val r" style="font-size:20px">${fmt(gas)}</div></div>
      <div class="rm"><div class="lbl">Balance</div><div class="val ${bal>=0?'g':'r'}" style="font-size:20px">${(bal<0?'-':'')+fmt(bal)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem">
      <div class="rm"><div class="lbl">Mayor categoría</div><div style="font-size:15px;font-weight:500;margin-top:4px">${cats[0]?cats[0][0]:'—'}</div><div style="font-size:12px;color:#888">${cats[0]?fmt(cats[0][1]):'-'}</div></div>
      <div class="rm"><div class="lbl">Movimientos</div><div style="font-size:15px;font-weight:500;margin-top:4px">${lista.length} en total</div><div style="font-size:12px;color:#888">${lista.filter(m=>m.tipo==='gasto').length} gastos · ${lista.filter(m=>m.tipo==='ingreso').length} ingresos</div></div>
    </div>
    <div class="divider"></div>
    <div class="sec-lbl" style="margin-bottom:.75rem">distribución de gastos</div>
    <div class="chart-wrap"><canvas id="rep-chart" role="img" aria-label="Gráfico de torta distribución de gastos por categoría"></canvas></div>
    <div class="divider"></div>
    <div class="sec-lbl" style="margin-bottom:.75rem">detalle por categoría</div>
    ${cats.map(([c,v])=>{const pct=Math.round(v/gas*100);const col=CAT_COLORS[c]||'#888';return`<div class="cat-row"><div class="cat-top"><span style="font-weight:500">${c}</span><span>${fmt(v)} <span style="color:#bbb">${pct}%</span></span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div>`;}).join('')}
    <div class="divider"></div>
    <div class="sec-lbl" style="margin-bottom:.75rem">todos los movimientos</div>
    <table><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th style="text-align:right">Monto</th></tr></thead>
    <tbody>${lista.map(m=>{const col=CAT_COLORS[m.cat]||'#888';const isI=m.tipo==='ingreso';const catBadge=isI?'<span style="color:#ccc">—</span>':`<span class="badge" style="background:${col}22;color:${col}">${m.cat}</span>`;return`<tr><td style="color:#aaa">${fmtFecha(m.fecha)}</td><td>${m.desc}</td><td>${catBadge}</td><td><span class="badge" style="background:${isI?'#1D9E7522':'#C039222'};color:${isI?'#1D9E75':'#C0392B'}">${isI?'Ingreso':'Gasto'}</span></td><td style="text-align:right;font-weight:500;color:${isI?'#1D9E75':'#C0392B'}">${isI?'+':'-'}${fmt(m.monto)}</td></tr>`;}).join('')}</tbody></table>
    <div style="margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid #eee;font-size:11px;color:#bbb;text-align:center">Reporte generado · ${mesLabel(k)}</div>
  </div>`;
  setTimeout(()=>{
    const canvas=document.getElementById('rep-chart');if(!canvas)return;
    if(charts.rep)charts.rep.destroy();
    charts.rep=new Chart(canvas,{type:'doughnut',data:{labels:cats.map(([c])=>c),datasets:[{data:cats.map(([,v])=>Math.round(v)),backgroundColor:cats.map(([c])=>CAT_COLORS[c]||'#888'),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{boxWidth:12,font:{size:11}}}}}});
  },100);
}
 
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)cerrarModal();});
 
// INICIO
loadLocal();
poblarSelectores();
document.getElementById('fecha').value=hoy();
render();
cargarDesdeSheets();
</script>
</body>
